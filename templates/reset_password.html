<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password — PowerMTA Cloud Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;background:#0b0f19;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
        body::before{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(99,102,241,0.08) 0%,transparent 70%);pointer-events:none}
        .card{background:rgba(15,23,42,0.6);border:1px solid rgba(51,65,85,0.5);border-radius:16px;padding:40px;width:100%;max-width:420px;backdrop-filter:blur(20px);box-shadow:0 25px 50px rgba(0,0,0,0.3);position:relative;z-index:1}
        .icon-wrapper{width:56px;height:56px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 24px;font-size:22px;font-weight:700;color:#fff;box-shadow:0 8px 24px rgba(99,102,241,0.25)}
        h1{font-size:1.5rem;font-weight:700;text-align:center;margin-bottom:8px}
        .subtitle{text-align:center;color:#94a3b8;font-size:0.875rem;margin-bottom:28px;line-height:1.5}
        .form-group{margin-bottom:20px}
        label{display:block;font-size:0.8125rem;font-weight:500;color:#cbd5e1;margin-bottom:8px}
        .input-wrapper{position:relative}
        .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#64748b;width:18px;height:18px}
        input[type="email"],input[type="password"],input[type="text"]{width:100%;padding:12px 14px 12px 44px;background:rgba(15,23,42,0.8);border:1px solid #334155;border-radius:10px;color:#fff;font-size:0.9375rem;font-family:inherit;outline:none;transition:all 0.2s ease}
        input:focus{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,0.15)}
        input::placeholder{color:#475569}
        .btn-primary{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;font-size:0.9375rem;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s ease;margin-top:8px}
        .btn-primary:hover{transform:scale(1.02);box-shadow:0 8px 24px rgba(99,102,241,0.3)}
        .btn-primary:active{transform:scale(0.98)}
        .btn-primary:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .link{color:#60a5fa;text-decoration:none;font-size:0.875rem;transition:color 0.15s}
        .link:hover{color:#93bbfd}
        .back-link{text-align:center;margin-top:24px}
        .message{padding:12px 16px;border-radius:10px;font-size:0.875rem;margin-bottom:20px;display:none;line-height:1.5}
        .message.success{display:block;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#4ade80}
        .message.error{display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#f87171}
        .spinner{display:inline-block;width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:8px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .password-rules{font-size:0.75rem;color:#64748b;margin-top:6px}
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-wrapper">
            <svg style="width:28px;height:28px;color:#fff" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        </div>
        <h1>Reset Password</h1>
        <p class="subtitle">Enter your new password below.</p>
        
        <div id="message" class="message"></div>
        
        <form id="resetForm" onsubmit="handleReset(event)">
            <div class="form-group">
                <label>New Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    <input type="password" id="password" placeholder="Enter new password" required minlength="6">
                </div>
                <p class="password-rules">Minimum 6 characters</p>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <div class="input-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
                    <input type="password" id="confirmPassword" placeholder="Confirm new password" required minlength="6">
                </div>
            </div>
            <button type="submit" class="btn-primary" id="submitBtn">Reset Password</button>
        </form>
        
        <div class="back-link">
            <a href="/login" class="link">&larr; Back to Login</a>
        </div>
    </div>
    
    <script>
    async function handleReset(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (password !== confirmPassword) {
            msg.className = 'message error';
            msg.textContent = 'Passwords do not match.';
            msg.style.display = 'block';
            return;
        }
        
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        
        if (!token) {
            msg.className = 'message error';
            msg.textContent = 'Invalid or missing reset token. Please request a new reset link.';
            msg.style.display = 'block';
            return;
        }
        
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner"></span> Resetting...';
        msg.style.display = 'none';
        
        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ token, password })
            });
            const data = await res.json();
            
            if (res.ok) {
                msg.className = 'message success';
                msg.textContent = data.message || 'Password reset successfully! Redirecting to login...';
                msg.style.display = 'block';
                btn.innerHTML = '&#10003; Password Reset';
                setTimeout(function() { window.location.href = '/login'; }, 2000);
            } else {
                msg.className = 'message error';
                msg.textContent = data.error || 'Failed to reset password. The link may have expired.';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Reset Password';
            }
        } catch(err) {
            msg.className = 'message error';
            msg.textContent = 'Something went wrong. Please try again.';
            msg.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = 'Reset Password';
        }
    }
    </script>
</body>
</html>
