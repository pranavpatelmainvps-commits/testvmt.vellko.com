<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — VelkoMTA Cloud Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0b0f19;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden
        }

        body::before {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.08) 0%, transparent 70%);
            pointer-events: none
        }

        .card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(51, 65, 85, 0.5);
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            position: relative;
            z-index: 1
        }

        .icon-wrapper {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.25);
            transition: all 0.4s ease
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 8px
        }

        .subtitle {
            text-align: center;
            color: #94a3b8;
            font-size: 0.875rem;
            margin-bottom: 28px;
            line-height: 1.5
        }

        .link {
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.875rem;
            transition: color 0.15s
        }

        .link:hover {
            color: #93bbfd
        }

        .back-link {
            text-align: center;
            margin-top: 24px
        }

        .message {
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.875rem;
            margin-bottom: 20px;
            display: none;
            line-height: 1.5
        }

        .message.success {
            display: block;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80
        }

        .message.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171
        }

        .spinner {
            display: inline-block;
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon-wrapper" id="statusIcon">
            <span class="spinner"></span>
        </div>
        <h1 id="statusTitle">Verifying...</h1>
        <p class="subtitle" id="statusMsg">Please wait while we verify your email address.</p>

        <div id="message" class="message"></div>

        <div class="back-link">
            <a href="/login" class="link" id="actionLink">&larr; Back to Login</a>
        </div>
    </div>

    <script>
        async function verifyEmail() {
            var params = new URLSearchParams(window.location.search);
            var token = params.get('token');
            var icon = document.getElementById('statusIcon');
            var title = document.getElementById('statusTitle');
            var subtitle = document.getElementById('statusMsg');
            var msg = document.getElementById('message');
            var link = document.getElementById('actionLink');

            if (!token) {
                icon.innerHTML = '&#10007;';
                icon.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
                title.textContent = 'Invalid Link';
                subtitle.textContent = 'This verification link is invalid or incomplete.';
                msg.className = 'message error';
                msg.textContent = 'Please check your email for the correct verification link.';
                msg.style.display = 'block';
                return;
            }

            try {
                var res = await fetch('/api/auth/verify?token=' + encodeURIComponent(token));
                var data = await res.json();

                if (res.ok) {
                    icon.innerHTML = '&#10003;';
                    icon.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
                    icon.style.boxShadow = '0 8px 24px rgba(34,197,94,0.25)';
                    title.textContent = 'Email Verified!';
                    subtitle.textContent = '';
                    msg.className = 'message success';
                    msg.textContent = data.message || 'Your email has been verified. You can now login.';
                    msg.style.display = 'block';
                    link.textContent = 'Go to Login \u2192';
                    link.href = '/login';
                } else {
                    icon.innerHTML = '&#10007;';
                    icon.style.background = 'linear-gradient(135deg, #ef4444, #dc2626)';
                    icon.style.boxShadow = '0 8px 24px rgba(239,68,68,0.25)';
                    title.textContent = 'Verification Failed';
                    subtitle.textContent = '';
                    msg.className = 'message error';
                    msg.textContent = data.error || 'Invalid or expired token.';
                    msg.style.display = 'block';
                }
            } catch (err) {
                icon.innerHTML = '!';
                icon.style.background = 'linear-gradient(135deg, #f59e0b, #d97706)';
                title.textContent = 'Connection Error';
                subtitle.textContent = '';
                msg.className = 'message error';
                msg.textContent = 'Could not connect to the server. Please try again.';
                msg.style.display = 'block';
            }
        }
        verifyEmail();
    </script>
</body>

</html>
